<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <title>VoiceNet - Login</title>
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <style>
    body {
      font-family: Arial, Helvetica, sans-serif;
      background: linear-gradient(135deg, #89f7fe, #66a6ff);
      display: flex;
      align-items: center;
      justify-content: center;
      height: 100vh;
      margin: 0;
      padding: 16px;
    }
    .box {
      background: white;
      padding: 24px;
      border-radius: 10px;
      box-shadow: 0 8px 24px rgba(0,0,0,0.15);
      width: 100%;
      max-width: 360px;
      text-align: center;
    }
    h2 { margin: 0 0 16px; color: #333; font-size: 1.5rem; }
    input {
      width: 100%;
      padding: 12px;
      margin: 10px 0;
      border-radius: 6px;
      border: 1px solid #ddd;
      font-size: 1rem;
    }
    button {
      width: 100%;
      padding: 12px;
      border-radius: 6px;
      border: none;
      background: #333;
      color: #fff;
      font-size: 1rem;
      cursor: pointer;
      margin-top: 10px;
    }
    .error { color: #a00; margin-top: 10px; font-size: 0.95rem; }
  </style>
</head>
<body>
  <div class="box">
    <h2>VoiceNet Login</h2>
    <form autocomplete="off">
      <input id="reg" autocomplete="off" placeholder="Register No (922523205001 - 922523205062)" />
      <input id="pass" type="password" autocomplete="new-password" placeholder="Password (a - z)" />
      <input id="gmail" type="email" placeholder="Optional Gmail for notifications" />
      <button type="button" id="btn">Login</button>
      <button type="button" onclick="location.reload()">Refresh Page</button>
    </form>
    <div class="error" id="err"></div>
  </div>

<script>
document.addEventListener('DOMContentLoaded', () => {
  const wsProtocol = window.location.protocol === 'https:' ? 'wss:' : 'ws:';
  const ws = new WebSocket(`${wsProtocol}//${window.location.host}`);

  ws.onopen = () => console.log('🔗 WebSocket connected');
  ws.onmessage = (msg) => console.log('WS message:', msg.data);

  const btn = document.getElementById('btn');
  const err = document.getElementById('err');

  btn.addEventListener('click', async () => {
    err.textContent = '';
    const reg = document.getElementById('reg').value.trim();
    const pass = document.getElementById('pass').value.trim().toLowerCase();
    const gmail = document.getElementById('gmail').value.trim();

    if (!reg || !pass) {
      err.textContent = '❗ Enter credentials';
      return;
    }

    try {
      const res = await fetch('/login', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ registerNumber: reg, password: pass, gmail })
      });
      const j = await res.json();
      console.log('Login response:', j);

      if (j.success) {
        localStorage.setItem('voicenet_user', reg);
        ws.send(JSON.stringify({ type: 'login', registerNumber: reg }));
        location.replace('index.html');
      } else {
        err.textContent = j.message || '❗ Invalid credentials';
      }
    } catch (e) {
      console.error('Fetch error:', e);
      err.textContent = '❗ Network error';
    }
  });
});

</script>
</body>
</html>
