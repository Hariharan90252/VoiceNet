<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <title>VoiceNet - Text Chat</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <style>
    * { box-sizing: border-box; }
    body {
      font-family: Arial, Helvetica, sans-serif;
      background: linear-gradient(135deg, #f6d365, #fda085);
      margin: 0;
      padding: 16px;
    }
    h1 {
      text-align: center;
      color: #333;
      margin-bottom: 16px;
    }
    #chat-box {
      background: rgba(255, 255, 255, 0.5);
      border-radius: 8px;
      padding: 10px;
      height: 300px;
      overflow-y: auto;
      margin-bottom: 12px;
    }
    .message {
      margin-bottom: 10px;
      padding: 8px;
      border-radius: 6px;
      background: #fff;
      color: #333;
    }
    .message.right {
      background: #dcedc8;
      text-align: right;
    }
    .sender {
      font-size: 0.8rem;
      color: #555;
      margin-top: 4px;
    }
    #chat-input-area {
      display: flex;
      gap: 10px;
    }
    #chat-input {
      flex: 1;
      padding: 10px;
      border-radius: 6px;
      border: none;
    }
    #sendBtn {
      padding: 10px 20px;
      border-radius: 6px;
      border: none;
      background: #333;
      color: #fff;
      cursor: pointer;
    }
    #sendBtn:hover {
      background: #555;
    }
  </style>
</head>

<body>

<script>
  // Check login
  const user = localStorage.getItem('voicenet_user');
  if (!user) window.location.href = "login.html";
</script>

<h1>VoiceNet - Text Chat</h1>
<button onclick="window.location.href='index.html'"
        style="
        margin-top: 12px;
        padding: 10px 20px;
        background:#333;
        color:#fff;
        border:none;
        border-radius:6px;
        cursor:pointer;">
  ⬅ Back to Home
</button>

<div id="chat-box"></div>

<div id="chat-input-area">
  <input type="text" id="chat-input" placeholder="Type your message..." />
  <button id="sendBtn">Send</button>
</div>

<script>
  // Force correct WebSocket connection (important fix)
  const ws = new WebSocket(
    (location.protocol === "https:" ? "wss" : "ws") +
    "://" +
    location.hostname +
    ":3000"
  );

  const chatBox = document.getElementById("chat-box");
  const input = document.getElementById("chat-input");
  const sendBtn = document.getElementById("sendBtn");
  const regno = localStorage.getItem("voicenet_user");

  ws.onopen = () => {
    ws.send(JSON.stringify({
      type: "login",
      registerNumber: regno
    }));
  };

  ws.onmessage = (event) => {
    const data = JSON.parse(event.data);

    if (data.type === "text") {
      const msgDiv = document.createElement("div");
      msgDiv.className = "message";

      if (data.sender === regno) msgDiv.classList.add("right");

      msgDiv.textContent = data.message;

      const senderTag = document.createElement("div");
      senderTag.className = "sender";
      senderTag.textContent = `— ${data.sender}`;
      msgDiv.appendChild(senderTag);

      chatBox.appendChild(msgDiv);
      chatBox.scrollTop = chatBox.scrollHeight;
    }
  };

  sendBtn.onclick = () => {
    const message = input.value.trim();
    if (message === "") return;

    ws.send(JSON.stringify({
      type: "text",
      message,
      sender: regno
    }));

    input.value = "";
  };
</script>

</body>
</html>
