<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>VoiceNet - Text Chat</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <style>
    * { box-sizing: border-box; }
    body {
      font-family: Arial, sans-serif;
      background: linear-gradient(135deg, #f6d365, #fda085);
      margin: 0;
      padding: 16px;
    }
    h1 {
      text-align: center;
      color: #333;
      margin-bottom: 16px;
    }
    #chat-box {
      background: rgba(255, 255, 255, 0.5);
      border-radius: 8px;
      padding: 10px;
      height: 300px;
      overflow-y: auto;
      margin-bottom: 12px;
    }
    .message {
      margin-bottom: 10px;
      padding: 8px;
      border-radius: 6px;
      background: #fff;
      color: #333;
    }
    .message.right {
      background: #dcedc8;
    }
    .row {
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    .sender {
      font-size: 0.8rem;
      color: #555;
      margin-top: 4px;
    }
    .timestamp {
      font-size: 0.7rem;
      color: #888;
      margin-top: 2px;
    }
    .delete-btn {
      margin-left: 8px;
      background: #ff4d4d;
      color: #fff;
      border: none;
      border-radius: 4px;
      padding: 2px 6px;
      cursor: pointer;
      font-size: 0.7rem;
    }
    #chat-input-area {
      display: flex;
      gap: 10px;
    }
    #chat-input {
      flex: 1;
      padding: 10px;
      border-radius: 6px;
      border: none;
    }
    #sendBtn {
      padding: 10px 20px;
      border-radius: 6px;
      border: none;
      background: #333;
      color: #fff;
      cursor: pointer;
    }
    #sendBtn:hover {
      background: #555;
    }
  </style>
</head>
<body>

<script>
  const user = localStorage.getItem('voicenet_user');
  if (!user) window.location.href = "login.html";
</script>

<h1>VoiceNet - Text Chat</h1>
<button onclick="window.location.href='index.html'"
        style="margin-top: 12px; padding: 10px 20px; background:#333; color:#fff; border:none; border-radius:6px; cursor:pointer;">
  ⬅ Back to Home
</button>

<div id="chat-box"></div>

<div id="chat-input-area">
  <input type="text" id="chat-input" placeholder="Type your message..." />
  <button id="sendBtn">Send</button>
</div>

<script>
  const ws = new WebSocket(
    (location.protocol === "https:" ? "wss" : "ws") + "://" + location.hostname + ":3000"
  );

  const chatBox = document.getElementById("chat-box");
  const input = document.getElementById("chat-input");
  const sendBtn = document.getElementById("sendBtn");
  const regno = localStorage.getItem("voicenet_user");

  function loadMessages() {
    return JSON.parse(localStorage.getItem("chat_messages") || "[]");
  }

  function saveMessages(messages) {
    localStorage.setItem("chat_messages", JSON.stringify(messages));
  }

  function renderMessage(msg, index) {
    if (!msg.message || typeof msg.message !== "string") return;

    const msgDiv = document.createElement("div");
    msgDiv.className = "message";
    if (msg.sender === regno) msgDiv.classList.add("right");

    const row = document.createElement("div");
    row.className = "row";

    const textSpan = document.createElement("span");
    textSpan.textContent = msg.message;
    row.appendChild(textSpan);

    if (msg.sender === regno) {
      const delBtn = document.createElement("button");
      delBtn.className = "delete-btn";
      delBtn.textContent = "✖";
      delBtn.onclick = () => {
        const messages = loadMessages();
        messages.splice(index, 1);
        saveMessages(messages);
        showMessages();
      };
      row.appendChild(delBtn);
    }

    msgDiv.appendChild(row);

    const senderTag = document.createElement("div");
    senderTag.className = "sender";
    senderTag.textContent = `— ${msg.sender}`;
    msgDiv.appendChild(senderTag);

    const timeTag = document.createElement("div");
    timeTag.className = "timestamp";
    const time = new Date(msg.timestamp || Date.now());
    timeTag.textContent = isNaN(time.getTime()) ? "🕒 Just now" : time.toLocaleString();
    msgDiv.appendChild(timeTag);

    chatBox.appendChild(msgDiv);
  }

  function showMessages() {
    chatBox.innerHTML = "";
    const messages = loadMessages();
    messages.forEach((msg, i) => renderMessage(msg, i));
    chatBox.scrollTop = chatBox.scrollHeight;
  }

  function sendMessage() {
    const message = input.value.trim();
    if (!message) return;

    const msgObj = {
      type: "text",
      message,
      sender: regno,
      timestamp: Date.now()
    };

    ws.send(JSON.stringify(msgObj));
    input.value = "";
  }

  ws.onopen = () => {
    ws.send(JSON.stringify({ type: "login", registerNumber: regno }));
    showMessages();
  };

  ws.onmessage = (event) => {
    const data = JSON.parse(event.data);
    if (data.type === "text" && typeof data.message === "string") {
      if (!data.timestamp) data.timestamp = Date.now();
      const messages = loadMessages();
      messages.push(data);
      saveMessages(messages);
      showMessages();
    }
  };

  sendBtn.onclick = sendMessage;

  input.addEventListener("keydown", e => {
    if (e.key === "Enter") {
      e.preventDefault();
      sendMessage();
    }
  });
</script>

</body>
</html>
