<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Active Users</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <style>
    body {
      font-family: Arial, sans-serif;
      background: linear-gradient(135deg, #fdfbfb, #ebedee);
      padding: 16px;
      margin: 0;
    }
    h2 {
      color: #333;
      font-size: 1.5rem;
      margin-bottom: 16px;
    }
    .user {
      display: flex;
      align-items: center;
      background: #fff;
      padding: 10px 14px;
      border-radius: 8px;
      margin-bottom: 10px;
      box-shadow: 0 2px 6px rgba(0,0,0,0.1);
      font-size: 1rem;
    }
    .dot {
      height: 12px;
      width: 12px;
      background-color: green;
      border-radius: 50%;
      margin-right: 12px;
      flex-shrink: 0;
    }
  </style>
</head>
<body>
  <script>
    const user = localStorage.getItem('voicenet_user');
    if (!user) window.location.href = 'login.html';
  </script>

  <h2>👥 Active Users</h2>
  <button onclick="window.location.href='index.html'"
        style="
        margin-top: 12px;
        padding: 10px 20px;
        background:#333;
        color:#fff;
        border:none;
        border-radius:6px;
        cursor:pointer;">
  ⬅ Back to Home
</button>

  <div id="activeUsers"></div>

  <script>
   async function loadActiveUsers() {
  try {
    const res = await fetch('/api/active-users');
    const data = await res.json();
    const container = document.getElementById('activeUsers');
    container.innerHTML = '';

    if (data.length === 0) {
      container.innerHTML = '<p>No users are currently online.</p>';
      return;
    }

    const currentUser = localStorage.getItem('voicenet_user');

    data.forEach(user => {
      const div = document.createElement('div');
      div.className = 'user';
      div.innerHTML = `<div class="dot"></div><span>${user.registerNumber}</span>`;
      if (user.registerNumber === currentUser) div.style.fontWeight = 'bold'; // highlight yourself
      container.appendChild(div);
    });
  } catch(err) {
    console.error('Failed to load active users:', err);
    document.getElementById('activeUsers').textContent = 'Error loading active users';
  }
}

// Initial load
loadActiveUsers();

// Refresh every 5 seconds
setInterval(loadActiveUsers, 5000);

  </script>
</body>
</html>
